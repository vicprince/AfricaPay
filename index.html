<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>AfricaPay | Signin</title>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <div id="container">
      <div id="left">
        <div id="Signin">
          <div class="logo">
            <img src="https://cdn-icons-png.freepik.com/256/2802/2802745.png?uid=R24337168&ga=GA1.1.1801123153.1674431644&semt=ais_hybrid" alt="AfricaPay"/>
            <div class="logotext">
              <strong class="text1">Africa</strong><strong class="text2">pay_</strong>
            </div>
          </div>
          <form>
            <div>
              <label>Email or username</label>
              <input type="text" class="text-input" />
            </div>
            <div>
              <label> Password</label>
              <input type="password" class="text-input"/>
            </div>
            <button type="submit" class="primary-btn">Sign In </button>
          </form>
          <div class="links">
            <a href="#">Forgot Password</a>
            <a href="#">Sign in with company or school</a>
          </div>
          <div class="or">
            <hr class="bar" />
            <span>OR</span>
            <hr class="bar" />
          </div>
          <a href="#" class="secondary-btn">Create an account</a>
        </div>
        <footer id="main-footer">
          <p>Copyright &copy; 2018, victor_otunuga All Rights Reserved</p>
          <div>
            <a href="#">terms of use</a> | <a href="#">Privacy Policy</a>
          </div>
        </footer>
      </div>
      <div id="right">
        <div id="showcase">
          <div class="showcase-content">
            <h1 class="showcase-text">
              <strong>Let's Create the future together</strong>
            </h1>
            <a href="#" class="secondary-btn">Start a Free 10-day trial</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
